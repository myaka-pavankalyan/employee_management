<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Employee Details</title>
</head>
<body>
<h2>Employee Details</h2>
<table border="5" class="styled-table">
    <thead>
    <tr>
        <th>id</th>
        <th>name</th>
        <th>designation</th>
        <th>Salary</th>
    </tr>
    </thead>
    <tbody>
    <tr th:each="employee:${employee}">
        <td th:text="${employee.id}"></td>
        <td th:text="${employee.name}"></td>
        <td th:text="${employee.designation}"></td>
        <td th:text="${employee.sal}"></td>
    </tr>
</body>
</table>
</html>
