<!DOCTYPE html>
<html  xmlns:th="http://www.thymeleaf.org" xmlns:xsi="http://www.w3.org/2001/XMLSchema-instance"
       xsi:schemaLocation="http://www.thymeleaf.org ">
<head>
    <meta charset="UTF-8">
    <title>StudentManagementSystem</title>
    <link href=”https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css” rel=”stylesheet” integrity=”sha384-rGc5a4CZNrDyZM96D/AJLHaaLgMQp8rCw+3Mi6lO2eNg6bPqfgJInQFnZlA1a11K” crossorigin=”anonymous”>
</head>
<body>
<div>
    <h1>Student Details</h1>
    <form action="#" th:action="@{/addEmployee}" th:object="${employee}" method="POST">
        Employee Name:<input type="text" th:field="*{name}" placeholder="Name"/><br/>
        Employee Designation:<input type="text" th:field="*{designation}" placeholder="Designation"/><br/>
        Employee Salary:<input type="text" th:field="*{sal}" placeholder="Salary"/><br/>
        <button type="submit">Save</button>
    </form>
</div>

</body>
</html>
