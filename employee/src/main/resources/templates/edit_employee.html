<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Edit Student</title>
    <meta charset="UTF-8">
</head>
<body>
<h2>Edit Student Details</h2>
<form th:action="@{/update}" th:object="${employee}" method="post">
    <input type="hidden" th:field="*{id}" /><br/><br/>

    <label for="name">Name:</label><br/>
    <input type="text" th:field="*{name}" id="name" required/><br/><br/>

    <label for="designation">Phone:</label><br/>
    <input type="text" th:field="*{designation}" id="designation" required/><br/><br/>

    <label for="sal">Name:</label><br/>
    <input type="text" th:field="*{sal}" id="sal" required/><br/><br/>

    <button type="submit">Update</button>
</form>
<br/>
<a th:href="@{/}">Back to List</a>
</body>
</html>
